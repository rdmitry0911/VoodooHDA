cold_boot_sequence:
- step: 1
  actor: AppleGFXHDAController::probe
  effect: Matches the PCI/IOService instance, captures vendor/device identity, sets model-specific defaults,
    and prepares controller capabilities.
- step: 2
  actor: AppleGFXHDAController::start
  effect: Stores provider and schedules asynchronous start via provider workloop command.
- step: 3
  actor: AppleGFXHDAController::startAction
  effect: Attaches to ancestor IOService context, increments instance count, opens provider, resolves
    workloop/event sources, and performs controller-side initialization of host interface / codecs / notifications.
- step: 4
  actor: AppleGFXHDADriver::start
  effect: Stores provider, allocates lock/name/work structures, then schedules asynchronous driver start.
- step: 5
  actor: AppleGFXHDADriver::handleAsynchronousStart
  effect: Dispatches startAction onto provider workloop gate.
- step: 6
  actor: AppleGFXHDADriver::startAction
  effect: Requires controller object at +0x138, invokes driver-completeStart, then notifies controller
    readyToSendFBMsg on success.
- step: 7
  actor: AppleGFXHDADriver::completeStart
  effect: 'Performs the heavy bring-up: power management strings/properties, child/controller/service
    registration, engine/path/node/widget graph creation, and engine activation.'
- step: 8
  actor: AppleGFXHDA38C8Driver::completeStart
  effect: Vendor-specific completion path ties driver to controller/framebuffer/power and EDID-aware activation
    rules.
- step: 9
  actor: AppleGFXHDAHALPlugIn _AudioDriverPlugInOpen
  effect: Creates or reuses a per-device userspace plugin instance and registers notification infrastructure.
- step: 10
  actor: HAL control enumeration
  effect: Plugin enumerates IOAudioControl children, wraps them, and mirrors state/properties to CoreAudio.
steady_state:
  kernel:
  - Controller handles unsolicited responses, framebuffer messages, power-state requests, stream start/stop,
    and codec/interrupt traffic.
  - Driver arbitrates higher-level audio-engine activation/deactivation and shutdown / terminate paths.
  - Engines propagate power transitions to PathSets, Paths, Nodes, and Widgets.
  userspace:
  - HAL plugin exposes DeviceGetProperty / SetProperty and Stream property callbacks.
  - Notification source receives mach messages and refreshes control inventory / state.
shutdown_sequence:
- 'HAL plugin closes: deregister notification hooks, drop per-device refcount, destroy per-device object
  when refcount reaches zero.'
- Kernel driver/controller stop paths detach event sources/notifiers, unregister services, release retained
  objects, and free work structures.
- systemWillShutdown / terminate paths quiesce engines and transition power down before final teardown.
