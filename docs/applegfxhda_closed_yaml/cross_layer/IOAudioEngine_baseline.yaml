baseline_state_machine:
  states:
  - constructed
  - service_started
  - workloop_ready
  - command_gate_ready
  - hardware_initialized_by_subclass
  - running
  - paused_or_suspended
  - stopped
  - freed
  transitions:
  - from: constructed
    to: service_started
    via: start
  - from: service_started
    to: workloop_ready
    via: start creates/obtains workloop and command gate
  - from: workloop_ready
    to: hardware_initialized_by_subclass
    via: subclass initHardware / subclass-specific setup
  - from: hardware_initialized_by_subclass
    to: running
    via: startAudioEngine -> performAudioEngineStart (override in AppleGFXHDAEngine)
  - from: running
    to: paused_or_suspended
    via: pauseAudioEngine/resumeAudioEngine/power transitions
  - from: running
    to: stopped
    via: performAudioEngineStop
  - from: service_started or running
    to: stopped
    via: stop
  - from: stopped
    to: freed
    via: free/destructor chain
contracts_used_by_AppleGFXHDAEngine:
- performAudioEngineStart/Stop are override points
- setWorkLoopOnAllAudioControls propagates engine workloop to controls
- status buffer and sample-frame buffer maintenance are base responsibilities
- resume/pause semantics and command-gate usage influence subclass power and DMA behavior
